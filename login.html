<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLD ON6WL — dB & dBm Cursus</title>
  <link rel="stylesheet" href="assets/css/wld.css">
  <style>
    body { background: var(--navy); }

    /* Grid-achtergrond */
    .login-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }

    /* Signaalbalkjes rechtsboven */
    .signal-bars {
      position: fixed;
      top: 28px; right: 36px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      z-index: 20;
    }
    .signal-bars span {
      display: block;
      width: 5px;
      background: var(--teal);
      border-radius: 2px;
    }

    /* Versie tag linksonder */
    .version-tag {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: var(--slate);
      font-family: var(--mono);
      z-index: 20;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="login-grid"></div>

<!-- Signaalbalkjes -->
<div class="signal-bars">
  <span style="height:6px; opacity:0.3; background:var(--slate)"></span>
  <span style="height:10px; opacity:0.5"></span>
  <span style="height:15px; opacity:0.72"></span>
  <span style="height:20px"></span>
</div>

<div class="login-page">

  <!-- RF-golven achtergrond -->
  <svg class="login-waves" viewBox="0 0 1200 80" preserveAspectRatio="none">
    <path class="rf-w3" fill="none" stroke="#00B4CC" stroke-width="1.2"
      d="M0,50 Q60,60 120,50 Q180,40 240,50 Q300,60 360,50 Q420,40 480,50 Q540,60 600,50 Q660,40 720,50 Q780,60 840,50 Q900,40 960,50 Q1020,60 1080,50 Q1140,40 1200,48"/>
    <path class="rf-w1" fill="none" stroke="#00B4CC" stroke-width="2"
      d="M0,62 Q40,72 80,62 Q120,52 160,62 Q200,72 240,62 Q280,52 320,62 Q360,72 400,62 Q440,52 480,62 Q520,72 560,62 Q600,52 640,62 Q680,72 720,62 Q760,52 800,62 Q840,72 880,62 Q920,52 960,62 Q1000,72 1040,62 Q1080,52 1120,62 Q1160,72 1200,65"/>
    <path class="rf-w2" fill="none" stroke="#00B4CC" stroke-width="1.5"
      d="M0,71 Q50,78 100,71 Q150,64 200,71 Q250,78 300,71 Q350,64 400,71 Q450,78 500,71 Q550,64 600,71 Q650,78 700,71 Q750,64 800,71 Q850,78 900,71 Q950,64 1000,71 Q1050,78 1100,71 Q1150,64 1200,71"/>
  </svg>

  <!-- Login card -->
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-bar"></div>
      <div class="login-logo-wld">WLD</div>
      <div class="login-logo-info">
        <span class="login-logo-sub">ON6WL · UBA</span>
        <span class="login-logo-name">Waaslandse Radio Amateurs</span>
      </div>
    </div>

    <!-- Titel -->
    <h1 class="login-title" id="lt">dB & dBm Cursus</h1>
    <p class="login-subtitle" id="ls">
      Leertraject voor radioamateurs. Voer je roepletters in en kies je taal om te starten.
    </p>

    <!-- Roepletters -->
    <label class="login-label" id="lc" for="callsign-inp">Jouw roepletters</label>
    <input
      id="callsign-inp"
      class="login-input"
      type="text"
      placeholder="bijv. ON3XYZ"
      maxlength="10"
      autocomplete="off"
      autocapitalize="characters"
    >

    <!-- Taalkeuze -->
    <div class="login-lang-label" id="ll">Taal / Language / Langue</div>
    <div class="login-lang-grid">
      <button class="lang-btn selected" data-lang="nl" onclick="selectLang('nl', this)">
        <span class="lang-btn-flag">🇧🇪</span>
        <span class="lang-btn-name">Nederlands</span>
      </button>
      <button class="lang-btn" data-lang="fr" onclick="selectLang('fr', this)">
        <span class="lang-btn-flag">🇫🇷</span>
        <span class="lang-btn-name">Français</span>
      </button>
      <button class="lang-btn" data-lang="en" onclick="selectLang('en', this)">
        <span class="lang-btn-flag">🇬🇧</span>
        <span class="lang-btn-name">English</span>
      </button>
    </div>

    <!-- Start -->
    <button class="btn-start" id="startBtn" onclick="startCursus()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span id="lb">Start de cursus</span>
    </button>

    <!-- Gast -->
    <div style="text-align:center; margin-top:14px;">
      <button onclick="startCursus(true)" style="background:none; border:none; color:var(--slate); font-size:0.8rem; cursor:pointer; font-family:var(--font);" id="lg">
        Doorgaan als gast
      </button>
    </div>

  </div>
</div>

<div class="version-tag">WLD ON6WL · Cursus dB & dBm · v1.0</div>

<script>
  const TEXTS = {
    nl: { title:'dB & dBm Cursus', sub:'Leertraject voor radioamateurs. Voer je roepletters in en kies je taal om te starten.', call:'Jouw roepletters', ph:'bijv. ON3XYZ', lang:'Taal / Language / Langue', btn:'Start de cursus', guest:'Doorgaan als gast' },
    fr: { title:'Cours dB & dBm', sub:"Parcours d'apprentissage pour radioamateurs. Entrez votre indicatif et choisissez votre langue.", call:'Votre indicatif', ph:'ex. ON3XYZ', lang:'Langue / Taal / Language', btn:'Démarrer le cours', guest:"Continuer en tant qu'invité" },
    en: { title:'dB & dBm Course', sub:'Learning track for radio amateurs. Enter your callsign and choose your language to begin.', call:'Your callsign', ph:'e.g. ON3XYZ', lang:'Language / Taal / Langue', btn:'Start the course', guest:'Continue as guest' },
  };

  let selectedLang = 'nl';

  function selectLang(lang, btn) {
    selectedLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const t = TEXTS[lang];
    document.getElementById('lt').textContent = t.title;
    document.getElementById('ls').textContent = t.sub;
    document.getElementById('lc').textContent = t.call;
    document.getElementById('callsign-inp').placeholder = t.ph;
    document.getElementById('ll').textContent = t.lang;
    document.getElementById('lb').textContent = t.btn;
    document.getElementById('lg').textContent = t.guest;
  }

  function startCursus(guest = false) {
    const callsign = guest ? 'GUEST' : (document.getElementById('callsign-inp').value.trim().toUpperCase() || 'GUEST');
    // Opslaan
    let state = {};
    try { state = JSON.parse(localStorage.getItem('wld_dbcursus')) || {}; } catch {}
    state.callsign = callsign;
    state.lang = selectedLang;
    localStorage.setItem('wld_dbcursus', JSON.stringify(state));
    window.location.href = 'index.html';
  }

  // Enter key
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('callsign-inp').addEventListener('keydown', e => {
      if (e.key === 'Enter') startCursus();
    });
    // Check bestaande sessie
    try {
      const s = JSON.parse(localStorage.getItem('wld_dbcursus'));
      if (s && s.lang) selectLang(s.lang, document.querySelector('[data-lang="' + s.lang + '"]'));
      if (s && s.callsign && s.callsign !== 'GUEST')
        document.getElementById('callsign-inp').value = s.callsign;
    } catch {}
  });
</script>
</body>
</html>
